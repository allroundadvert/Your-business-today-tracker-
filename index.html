<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Record App</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0a7cff">

<style>
body { font-family: Arial; margin: 0; background: #f4f4f4; }
header { background: #0a7cff; color: white; padding: 20px; text-align: center; font-size: 22px; }
.container { padding: 15px; }

input, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: green;
    color: white;
    border: none;
}

table {
    width: 100%;
    background: white;
    margin-top: 15px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th { background: #0a7cff; color: white; }

.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px;
}

.total {
    margin-top: 10px;
    padding: 10px;
    background: white;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    SALES RECORD APP
    <div style="font-size:13px;">Business Sales Tracker</div>
</header>

<div class="container">

<input type="text" id="product" placeholder="Product Name">
<input type="number" id="amount" placeholder="Amount (₦)">
<input type="date" id="date">

<button onclick="addSale()">Add Sale</button>

<table>
<thead>
<tr>
<th>Product</th>
<th>Amount</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="total">
Total: ₦<span id="total">0</span>
</div>

</div>

<script>
let sales = JSON.parse(localStorage.getItem("sales")) || [];

function addSale() {
    let product = productInput.value;
    let amount = amountInput.value;
    let date = dateInput.value;

    if (!product || !amount || !date) {
        alert("Fill all fields");
        return;
    }

    let time = new Date().toLocaleTimeString();

    sales.push({product, amount:Number(amount), date, time});
    localStorage.setItem("sales", JSON.stringify(sales));

    productInput.value = "";
    amountInput.value = "";
    dateInput.value = "";

    display();
}

function display() {
    table.innerHTML = "";
    let total = 0;

    sales.forEach((s, i) => {
        total += s.amount;

        table.innerHTML += `
        <tr>
            <td>${s.product}</td>
            <td>₦${s.amount}</td>
            <td>${s.date}</td>
            <td>${s.time}</td>
            <td><button class="delete-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    totalEl.innerText = total;
}

function del(i) {
    sales.splice(i,1);
    localStorage.setItem("sales", JSON.stringify(sales));
    display();
}

const productInput = document.getElementById("product");
const amountInput = document.getElementById("amount");
const dateInput = document.getElementById("date");
const table = document.getElementById("table");
const totalEl = document.getElementById("total");

display();

// Register service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
