<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Record App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a7cff">

<!-- ✅ Firebase (WORKING VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 0; background:#f4f4f4; }

header {
    background:#0a7cff;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
}

.container { padding:15px; }

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    background:green;
    color:white;
    border:none;
    font-size:15px;
}

table {
    width:100%;
    background:white;
    margin-top:10px;
    border-collapse: collapse;
}

th, td {
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th { background:#0a7cff; color:white; }

.delete-btn { background:red; color:white; border:none; padding:5px; }

.logout-btn { background:black; margin-top:10px; }

canvas {
    margin-top:20px;
    background:white;
    padding:10px;
}
</style>
</head>

<body>

<header>SALES RECORD APP</header>

<div class="container">

<!-- 🔐 AUTH -->
<div id="auth">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- 📊 APP -->
<div id="app" style="display:none;">

<button class="logout-btn" onclick="logout()">Logout</button>

<input type="text" id="product" placeholder="Product Name">
<input type="number" id="amount" placeholder="Amount (₦)">
<input type="date" id="date">

<button onclick="addSale()">Add Sale</button>
<button onclick="exportExcel()">Export Excel</button>

<table>
<thead>
<tr>
<th>Product</th>
<th>Amount</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<canvas id="chart"></canvas>

</div>

</div>

<script>
// 🔥 PUT YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

// INIT
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");

let userId = null;

// REGISTER
function register() {
    auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(()=> alert("Registered successfully"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
    auth.signInWithEmailAndPassword(email.value, password.value)
    .then(()=> alert("Login successful"))
    .catch(e => alert(e.message));
}

// LOGOUT
function logout() {
    auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user => {
    if (user) {
        userId = user.uid;
        authDiv.style.display = "none";
        appDiv.style.display = "block";
        loadSales();
    } else {
        authDiv.style.display = "block";
        appDiv.style.display = "none";
    }
});

// ADD SALE
function addSale() {
    if (!product.value || !amount.value || !date.value) {
        alert("Fill all fields");
        return;
    }

    db.collection("sales").add({
        product: product.value,
        amount: Number(amount.value),
        date: date.value,
        time: new Date().toLocaleTimeString(),
        userId: userId
    });

    product.value = "";
    amount.value = "";
    date.value = "";
}

// LOAD SALES
function loadSales() {
    db.collection("sales")
    .where("userId","==",userId)
    .onSnapshot(snapshot => {

        table.innerHTML = "";
        let totals = {};

        snapshot.forEach(doc => {
            let s = doc.data();

            table.innerHTML += `
            <tr>
                <td>${s.product}</td>
                <td>₦${s.amount}</td>
                <td>${s.date}</td>
                <td>${s.time}</td>
                <td><button class="delete-btn" onclick="del('${doc.id}')">X</button></td>
            </tr>`;

            totals[s.date] = (totals[s.date] || 0) + s.amount;
        });

        drawChart(totals);
    });
}

// DELETE
function del(id) {
    db.collection("sales").doc(id).delete();
}

// CHART
let chart;
function drawChart(data) {
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: Object.keys(data),
            datasets: [{
                label: "Daily Sales",
                data: Object.values(data)
            }]
        }
    });
}

// EXPORT CSV
function exportExcel() {
    let csv = "Product,Amount,Date,Time\n";

    document.querySelectorAll("#table tr").forEach(row => {
        let cols = row.querySelectorAll("td");
        if(cols.length){
            csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText}\n`;
        }
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "sales.csv";
    a.click();
}

// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
